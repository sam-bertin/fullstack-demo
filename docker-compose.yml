services:
  postgres:
    image: postgres:16-alpine
    container_name: livechat-postgres
    environment:
      POSTGRES_DB: livechat
      POSTGRES_USER: livechat
      POSTGRES_PASSWORD: livechat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livechat -d livechat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
