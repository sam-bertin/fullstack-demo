name: CI Backend

on:
  push:
    paths:
      - 'backend/backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-21
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('backend/backend/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run Checkstyle
        run: mvn -q checkstyle:check

  test:
    name: Unit Tests (JUnit 5)
    runs-on: ubuntu-latest
    needs: [lint]
    container:
      image: maven:3.9-eclipse-temurin-21
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('backend/backend/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: mvn -q test

  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    needs: [test]
    container:
      image: maven:3.9-eclipse-temurin-21
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('backend/backend/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build JAR
        run: mvn -q -DskipTests clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/backend/target/*.jar
          retention-days: 5