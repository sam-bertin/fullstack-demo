name: CI Backend

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'backend/backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw

      - name: Setup Java et Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: ./mvnw -q checkstyle:check

  test:
    name: Unit Tests (JUnit 5)
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw

      - name: Setup Java et Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw -q test

  build:
    name: Build (Maven)
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: backend/backend
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw

      - name: Setup Java et Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw -q -DskipTests clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/backend/target/*.jar
          retention-days: 5